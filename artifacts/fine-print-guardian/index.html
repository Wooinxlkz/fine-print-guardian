    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Fine-Print Guardian",
      "url": "https://fine-print-guardian.replit.app/",

        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>

    <!-- Hide Clerk "Development mode" badge via MutationObserver -->
    <script>
      (function () {
        function hideDevBadge() {
          document.querySelectorAll('*').forEach(function (el) {
            try {
              // Only target leaf nodes whose sole text is the badge label
              if (el.children.length === 0 && /^(Development|Sandbox) mode$/i.test((el.textContent || '').trim())) {
                // Walk up at most 3 levels to find the badge wrapper,
                // stopping before we'd hide the auth card itself.
                var target = el.parentElement;
                for (var i = 0; i < 3; i++) {
                  if (!target || target === document.body) break;
                  var cls = target.className || '';
                  target.style.setProperty('display', 'none', 'important');
                  // Stop if we've found an element that looks like the badge wrapper
                  if (typeof cls === 'string' && (cls.indexOf('badge') !== -1 || cls.indexOf('Badge') !== -1 || cls.indexOf('banner') !== -1)) break;
                  target = target.parentElement;
                }
              }
            } catch (_) {}
          });
        }
        var obs = new MutationObserver(hideDevBadge);
        function start() {
          obs.observe(document.body, { childList: true, subtree: true });
          hideDevBadge();
        }
        if (document.body) { start(); } else { document.addEventListener('DOMContentLoaded', start); }
      })();
    </script>
